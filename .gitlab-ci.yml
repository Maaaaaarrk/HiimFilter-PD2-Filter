stages:
  - build

build-filters:
  stage: build
  image: alpine:latest
  before_script:
    - apk add --no-cache git bash
    - git config user.email "ci@gitlab.com"
    - git config user.name "GitLab CI"
    # Allow pushing back to the repo via the CI job token
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - cd builder

    # ── Phase 1: Increment version and generate 01-Version.filter ──────────────
    - |
      VERSION=$(cat version.txt 2>/dev/null | tr -d '[:space:]')
      if ! echo "$VERSION" | grep -qE '^[0-9]+$'; then VERSION=0; fi
      VERSION=$((VERSION + 1))
      echo "$VERSION" > version.txt

    - |
      MONTH=$(date +%-m)
      DAY=$(date +%-d)
      case $MONTH in
        1)  MONTHNAME="January"   ;;
        2)  MONTHNAME="February"  ;;
        3)  MONTHNAME="March"     ;;
        4)  MONTHNAME="April"     ;;
        5)  MONTHNAME="May"       ;;
        6)  MONTHNAME="June"      ;;
        7)  MONTHNAME="July"      ;;
        8)  MONTHNAME="August"    ;;
        9)  MONTHNAME="September" ;;
        10) MONTHNAME="October"   ;;
        11) MONTHNAME="November"  ;;
        12) MONTHNAME="December"  ;;
      esac
      case $DAY in
        1|21|31) SUFFIX="st" ;;
        2|22)    SUFFIX="nd" ;;
        3|23)    SUFFIX="rd" ;;
        *)       SUFFIX="th" ;;
      esac
      PRETTYDATE="${MONTHNAME} ${DAY}${SUFFIX}"
      printf "Last updated %s%%CL%%Season 12 - build %s" "$PRETTYDATE" "$VERSION" > 01-Version.filter

    # ── Phase 2: Concatenate filter parts into output filters ───────────────────
    - |
      cat 00-Hiim_Top.filter 01-Version.filter 02-Hiim_Top.filter 02-Hiim_Top-End.filter 03-alias-general.filter 03-PD2_items.filter 04-Ubermats.filter 05-Maps.filter 06-Gems.filter 07-Runes.filter 07-Runes-ToolTip.filter 08-Potions.filter 09-QuestItems.filter 10-Formatted_MagRare_Names.filter 11-Formatted_MagRare_All.filter 12-Unid_MagRare.filter 13-Formatted_MagicRare.filter 14-RingAmuJewelPts.filter 15-Formatted_Charms.filter 16-Tags_All.filter 17-Tags_LLD.filter 18-Unid_UniquesSet_Name.filter 19-Tags_Unid_UniquesSet.filter 20-Unid_UniquesSet_Tiers.filter 20-Unid_UniquesSet_Tiers_Hides.filter 21-Tags_Weap_range.filter 22-Tags_Shopping.filter 23-Tags_Crafting_Unid.filter 24-Tags_Crafting_Id.filter 25-Nmag_TopFilter.filter 26-Nmag_Staffmod.filter 27-Tags_Nmag_Sockets.filter 28-Tags_Nmag_runewords.filter 29-Tags_Nmag_bases.filter 30-Tags_Sockets_Upgrading.filter 31-Leveling.filter 32-Footer.filter 33-Gambleing.filter > ../Hiim.filter

      cat 00-Hiim_Top.filter 01-Version.filter 02-Hiim_Top-Hyper.filter 02-Hiim_Top-End.filter 03-alias-hyper.filter 03-PD2_items.filter 04-Ubermats.filter 05-Maps.filter 06-Gems.filter 07-Runes.filter 07-Runes-ToolTip.filter 08-Potions.filter 09-QuestItems.filter 10-Formatted_MagRare_Names.filter 11-Formatted_MagRare_All.filter 12-Unid_MagRare.filter 13-Formatted_MagicRare.filter 14-RingAmuJewelPts.filter 15-Formatted_Charms.filter 16-Tags_All.filter 17-Tags_LLD.filter 18-Unid_UniquesSet_Name.filter 18-Unid_UniquesSet_Name_meme.filter 19-Tags_Unid_UniquesSet.filter 20-Unid_UniquesSet_Tiers.filter 20-Unid_UniquesSet_Tiers_Hides.filter 21-Tags_Weap_range.filter 22-Tags_Shopping.filter 23-Tags_Crafting_Unid.filter 24-Tags_Crafting_Id.filter 25-Nmag_TopFilter.filter 26-Nmag_Staffmod.filter 27-Tags_Nmag_Sockets.filter 28-Tags_Nmag_runewords.filter 29-Tags_Nmag_bases.filter 30-Tags_Sockets_Upgrading.filter 31-Leveling.filter 32-Footer.filter 33-Gambleing.filter > ../Hiim_Hyper.filter

      cat 00-Hiim_Top.filter 01-Version.filter 02-Hiim_Top-Grail.filter 02-Hiim_Top-End.filter 03-alias-general.filter 03-PD2_items.filter 04-Ubermats.filter 05-Maps.filter 06-Gems.filter 07-Runes.filter 07-Runes-ToolTip.filter 08-Potions.filter 09-QuestItems.filter 10-Formatted_MagRare_Names.filter 11-Formatted_MagRare_All.filter 12-Unid_MagRare.filter 13-Formatted_MagicRare.filter 14-RingAmuJewelPts.filter 15-Formatted_Charms.filter 16-Tags_All.filter 17-Tags_LLD.filter 18-Unid_UniquesSet_Name.filter 19-Tags_Unid_UniquesSet.filter 20-Unid_UniquesSet_Tiers.filter 20-Unid_UniquesSet_Tiers_Grail.filter 21-Tags_Weap_range.filter 22-Tags_Shopping.filter 23-Tags_Crafting_Unid.filter 24-Tags_Crafting_Id.filter 25-Nmag_TopFilter.filter 26-Nmag_Staffmod.filter 27-Tags_Nmag_Sockets.filter 28-Tags_Nmag_runewords.filter 29-Tags_Nmag_bases.filter 30-Tags_Sockets_Upgrading.filter 31-Leveling.filter 32-Footer.filter 33-Gambleing.filter > ../Hiim_Grail.filter

