    # ── Phase 3: Generate README ────────────────────────────────────────────────
    - |
      # Read version filter content, stripping %CL% color codes to a space
      VERLINE=$(cat 01-Version.filter | sed 's/%CL%/ /g')
      # Replace {{REPLACE_ME}} placeholder and &&& -> !
      sed "s|{{REPLACE_ME}}|${VERLINE}|g; s|&&&||g" README.md | sed 's/\[\[/![/g' > ../README.md

    # ── Phase 4: Commit and push generated files back ───────────────────────────
    - |
      cd ..
      git add Hiim.filter Hiim_Hyper.filter Hiim_Grail.filter Hiim_Crafting.filter \
              Hiim_Vanilla_Plus.filter Hiim_Mystery.filter \
              Hiim_Crafting_Amazon_Focused.filter Hiim_Crafting_Assassin_Focused.filter \
              Hiim_Crafting_Barbarian_Focused.filter Hiim_Crafting_Druid_Focused.filter \
              Hiim_Crafting_Necromancer_Focused.filter Hiim_Crafting_Sorceress_Focused.filter \
              Hiim_Crafting_Paladin_Focused.filter Hiim_LLD_Focused.filter \
              Hiim_LLD_Hyper.filter Hiim_TalRasha_Themed.filter \
              Hiim_Only_Filter.filter Hiim_Closed_Beta.filter \
              README.md builder/version.txt builder/01-Version.filter
      # Only commit if there are actual changes
      if git diff --cached --quiet; then
        echo "No changes to commit."
      else
        git commit -m "ci: build filters (version ${VERSION})"
        git push origin HEAD:${CI_COMMIT_REF_NAME}
      fi

  # Skip this job if it was triggered by the CI commit itself (prevents infinite loop)
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /^ci: build filters/'
      when: never
    - when: always
