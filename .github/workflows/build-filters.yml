name: Build Filters

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - '*.filter'   # root .filter files are auto-generated — edits here should not trigger a rebuild
      - 'README.md'  # also auto-generated

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Increment version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          if ! echo "$VERSION" | grep -qE '^[0-9]+$'; then VERSION=0; fi
          VERSION=$((VERSION + 1))
          echo "$VERSION" > version.txt
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build filters
        run: python builderfilter/build.py

      - name: Generate README
        run: python builderreadme/create_readme.py

      - name: Validate filters
        run: python validate_filters.py --errors-only

      - name: Commit and push generated files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add version.txt \
                  "builderfilter/01-header/01-Version[ALL].filter" \
                  filter_definitions.json \
                  README.md
          git add *.filter 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: build filters (version ${{ env.VERSION }})"
            git push
          fi
