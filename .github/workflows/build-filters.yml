name: Build Filters

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'builderfilter/**'
      - 'builderreadme/**'
      - 'version.txt'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Increment version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          if ! echo "$VERSION" | grep -qE '^[0-9]+$'; then VERSION=0; fi
          VERSION=$((VERSION + 1))
          echo "$VERSION" > version.txt
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build filters
        run: python builderfilter/build.py

      - name: Generate README
        run: python builderreadme/create_readme.py

      - name: Commit and push generated files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add version.txt \
                  "builderfilter/01-header/01-Version[ALL].filter" \
                  Hiim.filter Hiim_Hyper.filter Hiim_Grail.filter Hiim_Crafting.filter \
                  Hiim_Vanilla_Plus.filter Hiim_Mystery.filter \
                  Hiim_Crafting_Amazon_Focused.filter Hiim_Crafting_Assassin_Focused.filter \
                  Hiim_Crafting_Barbarian_Focused.filter Hiim_Crafting_Druid_Focused.filter \
                  Hiim_Crafting_Necromancer_Focused.filter Hiim_Crafting_Sorceress_Focused.filter \
                  Hiim_Crafting_Paladin_Focused.filter Hiim_LLD_Focused.filter \
                  Hiim_LLD_Hyper.filter Hiim_TalRasha_Themed.filter \
                  Hiim_Only_Filter.filter Hiim_Closed_Beta.filter \
                  README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: build filters (version ${{ env.VERSION }})"
            git push
          fi
